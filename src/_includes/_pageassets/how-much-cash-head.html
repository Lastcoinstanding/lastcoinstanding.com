  "description": "Interactive tool for the fully-allocated bitcoin holder, asking what share of a stack to hold as cash and where in the Power Law channel raising it has historically meant more bitcoin rather than less. Coin-denominated. Reads the historical record with the same neighborhood method as Wait-or-Deploy-Now, from the opposite side: that page asks a cash holder whether to deploy or wait, this one asks an all-in holder whether to hold or raise, and the two share one engine so they cannot disagree. For a chosen channel position it reports how often a lower rebuy arrived within two years, the typical discount and wait, and the median coins returned per coin sold after capital-gains tax; the rebuy rule is fixed at the first lower entry within two years, else the two-year price. Prices the Disciplined Rebalancing protocol rather than restating it. Warns explicitly at floor positions, where a lower entry historically never arrived, and past an 80% cash share, where a buffer becomes an exit. Makes no recommendation and no prediction.",
